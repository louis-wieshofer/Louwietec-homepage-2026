<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="white" stroke="white" stroke-linecap="round" stroke-linejoin="round">
  <!--
    Brain circuit logo — closely matching the original reference image.
    White on transparent. Scalloped brain outline, central trunk,
    left = organic curves, right = angular circuits. Nodes at endpoints.
  -->

  <!-- ============================================ -->
  <!--  OUTER BRAIN SHAPE (scalloped/cloud edge)    -->
  <!-- ============================================ -->

  <!-- Left hemisphere outline with bumps -->
