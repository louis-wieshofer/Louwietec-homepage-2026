  <path d="M38 78 C28 66, 24 48, 32 36 C40 24, 55 18, 72 16" fill="none" stroke="white" stroke-width="8"/>

  <!-- Right hemisphere outline with bumps -->
  <path d="
    M200 395
    C205 380, 212 355, 220 335
    C228 310, 242 295, 260 278
    C280 258, 302 240, 322 215
    C342 190, 358 168, 365 145
    C372 120, 370 98, 362 78
    C352 55, 335 38, 310 26
    C288 16, 262 14, 240 20
    C222 25, 208 38, 200 58
  " fill="none" stroke="white" stroke-width="8"/>

  <!-- Right bumps -->
  <path d="M365 145 C380 148, 388 132, 385 115 C382 100, 372 88, 362 78" fill="none" stroke="white" stroke-width="8"/>
  <path d="M322 215 C342 222, 358 210, 362 192 C366 176, 360 162, 348 148" fill="none" stroke="white" stroke-width="8"/>
  <path d="M260 278 C282 288, 302 278, 310 260 C318 244, 314 228, 305 215" fill="none" stroke="white" stroke-width="8"/>
