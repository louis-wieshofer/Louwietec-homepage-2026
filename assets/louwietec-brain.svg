  <path d="M362 78 C372 66, 376 48, 368 36 C360 24, 345 18, 328 16" fill="none" stroke="white" stroke-width="8"/>

  <!-- ============================================ -->
  <!--  CENTRAL TRUNK                               -->
  <!-- ============================================ -->
  <line x1="200" y1="58" x2="200" y2="370" stroke="white" stroke-width="10" fill="none"/>

  <!-- ============================================ -->
  <!--  LEFT BRANCHES (organic, curved)             -->
  <!-- ============================================ -->

  <!-- Branch L1 — top -->
  <path d="M200 105 C170 95, 135 80, 100 58" fill="none" stroke-width="7"/>
  <!-- sub-branch from L1 -->
  <path d="M135 82 C120 68, 100 55, 78 42" fill="none" stroke-width="5"/>
  <!-- sub-branch down from L1 endpoint -->
  <path d="M100 58 C82 65, 62 80, 50 100" fill="none" stroke-width="5"/>
