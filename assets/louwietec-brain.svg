  <path d="M200 315 C182 310, 168 302, 155 288" fill="none" stroke-width="5"/>
  <circle cx="155" cy="288" r="7" stroke="none"/>

  <!-- ============================================ -->
  <!--  RIGHT BRANCHES (angular, circuit-like)      -->
  <!-- ============================================ -->

  <!-- Branch R1 — top -->
  <path d="M200 105 L245 88 L300 58" fill="none" stroke-width="7"/>
  <!-- sub-branch from R1 -->
  <path d="M245 88 L270 62 L298 42" fill="none" stroke-width="5"/>
  <!-- sub-branch from endpoint -->
  <path d="M300 58 L325 72 L350 100" fill="none" stroke-width="5"/>
  <!-- nodes -->
  <circle cx="300" cy="58" r="9" stroke="none"/>
  <circle cx="298" cy="42" r="7" stroke="none"/>
  <circle cx="350" cy="100" r="7" stroke="none"/>

  <!-- Branch R2 — upper mid -->
  <path d="M200 170 L252 160 L310 168" fill="none" stroke-width="7"/>
  <!-- sub-branch up -->
  <path d="M252 160 L278 135 L328 118" fill="none" stroke-width="5"/>
  <!-- sub-branch down -->
  <path d="M310 168 L335 185 L352 222" fill="none" stroke-width="5"/>
  <!-- nodes -->
  <circle cx="310" cy="168" r="9" stroke="none"/>
  <circle cx="328" cy="118" r="7" stroke="none"/>
  <circle cx="352" cy="222" r="7" stroke="none"/>

  <!-- Branch R3 — lower mid -->
  <path d="M200 248 L255 241 L280 252" fill="none" stroke-width="6"/>
  <!-- sub-branch -->
  <path d="M255 241 L275 220 L300 205" fill="none" stroke-width="5"/>
  <!-- nodes -->
  <circle cx="280" cy="252" r="8" stroke="none"/>
  <circle cx="300" cy="205" r="7" stroke="none"/>

  <!-- Branch R4 — bottom -->
  <path d="M200 315 L228 305 L245 288" fill="none" stroke-width="5"/>
  <circle cx="245" cy="288" r="7" stroke="none"/>

</svg>