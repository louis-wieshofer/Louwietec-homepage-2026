  <circle cx="100" cy="58" r="9" stroke="none"/>
  <circle cx="78" cy="42" r="7" stroke="none"/>
  <circle cx="50" cy="100" r="7" stroke="none"/>

  <!-- Branch L2 — upper mid -->
  <path d="M200 170 C168 162, 130 155, 90 168" fill="none" stroke-width="7"/>
  <!-- sub-branch up -->
  <path d="M130 157 C115 140, 95 125, 72 118" fill="none" stroke-width="5"/>
  <!-- sub-branch down -->
  <path d="M90 168 C72 180, 55 200, 48 222" fill="none" stroke-width="5"/>
