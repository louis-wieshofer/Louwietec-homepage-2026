<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" fill="white" stroke="white" stroke-linecap="round" stroke-linejoin="round">
  <!--
    Brain circuit logo — top-down view, wide rounded cloud shape.
    NOT a heart. Wide at top and middle, rounded at bottom.
    White on transparent.
  -->

