server {
    listen 80;
    server_name louwietec.com www.louwietec.com;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/xml text/plain;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "index, follow" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # No cache for HTML
    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Static files
    location = /robots.txt {
        default_type text/plain;
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        default_type application/xml;
        access_log off;
        log_not_found off;
    }

    location = /humans.txt {
        default_type text/plain;
        access_log off;
        log_not_found off;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
    }

    # Main routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
