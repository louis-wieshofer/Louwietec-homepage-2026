version: '3.8'
services:
  web:
    build: .
    ports:
      - "80:80"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 128m
    labels:
      - "coolify.managed=true"
