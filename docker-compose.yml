services:
  web:
    build: .
    ports:
      - "80:80"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128M
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    labels:
      - "coolify.managed=true"
